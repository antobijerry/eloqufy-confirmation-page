<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registration successful</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f7f8fb 0%, #eef3ff 100%);
    }
    .card {
      width: min(92vw, 420px);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(80,110,255,0.12);
      border-radius: 22px;
      padding: 28px 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.10);
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(80,110,255,0.12);
      color: #4f66ff;
      font-size: 30px;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: #5c6370;
      line-height: 1.5;
    }
    .note {
      margin-top: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>Registration successful</h1>
    <p>Your email has been confirmed. You can now return to Eloqufy and sign in.</p>
    <p class="note">You may close this page.</p>
  </main>
</body>
</html>
